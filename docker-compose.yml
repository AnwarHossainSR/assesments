services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: buddy
      POSTGRES_PASSWORD: buddy
      POSTGRES_DB: buddyscript
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  db-test:
    image: postgres:16
    environment:
      POSTGRES_USER: buddy
      POSTGRES_PASSWORD: buddy
      POSTGRES_DB: buddyscript_test
    ports: ["5434:5432"]
    tmpfs: ["/var/lib/postgresql/data"]
volumes:
  pgdata:
